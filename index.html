<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arab Studio</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0000;
    color:white;
    text-align:center;
}

/* صفحة الدخول */
#login{
    position:fixed;
    width:100%;
    height:100%;
    background:#0b0000;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

input{
    padding:10px;
    margin:10px;
    border:none;
    border-radius:6px;
}

button{
    padding:10px 20px;
    background:red;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

/* الصفحة الرئيسية */
#main{
    display:none;
    padding:40px;
}

.title{
    font-size:40px;
    color:red;
    text-shadow:0 0 20px red;
}

.cards{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:40px;
}

.card{
    width:200px;
    height:200px;
    background:#1a0000;
    border:1px solid red;
    border-radius:12px;
    box-shadow:0 0 20px red;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
}

.counter{
    margin-top:40px;
    font-size:18px;
}
</style>
</head>

<body>

<div id="login">
<h1 style="color:red">Arab Studio Login</h1>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="main">

<div class="title">Arab Studio</div>

<div class="cards">
<div class="card">Al-Rashidi</div>
<div class="card">Ghost</div>
</div>

<div class="counter">
Visitors: <span id="visits">0</span>
</div>

<br>

<a href="https://discord.com">
<button>Discord</button>
</a>

</div>

<script>
function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u=="admin" && p=="1234"){
document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";
}else{
alert("Wrong login");
}
}

let count=localStorage.getItem("visits");
if(!count){count=0;}
count++;
localStorage.setItem("visits",count);
document.getElementById("visits").innerText=count;
</script>

</body>
</html>
