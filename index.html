<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عرب استديو</title>

<style>
body{
    margin:0;
    font-family:Tahoma;
    background:#0a1f33;
    color:#0d47a1;
}

/* صفحة الدخول */
#loginPage{
    text-align:center;
    margin-top:120px;
}

h1{
    color:#0a1f33;
    border-bottom:4px solid #0a1f33;
    display:inline-block;
    padding-bottom:5px;
}

input{
    display:block;
    margin:15px auto;
    padding:12px;
    width:250px;
    border-radius:10px;
    border:none;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#0d47a1;
    color:white;
    font-weight:bold;
}

button:hover{
    opacity:0.8;
}

/* الصفحة الرئيسية */
#mainPage{
    display:none;
}

.header{
    text-align:center;
    padding:20px;
}

.header h1{
    color:#0a1f33;
}

.menu{
    position:fixed;
    right:20px;
    top:150px;
}

.menu button{
    display:block;
    width:220px;
    margin:15px 0;
    border-radius:25px;
    background:#0d47a1;
}

.content{
    text-align:center;
    margin-top:150px;
}

.card{
    background:black;
    width:220px;
    height:220px;
    display:inline-block;
    margin:20px;
    border-radius:20px;
    line-height:220px;
    font-size:24px;
    color:#0d47a1;
    font-weight:bold;
}
</style>

</head>
<body>

<!-- تسجيل الدخول -->
<div id="loginPage">
    <h1>عرب استديو</h1>

    <input type="text" id="username" placeholder="اسم المستخدم">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button onclick="login()">تسجيل دخول</button>
    <br><br>
    <button onclick="adminLogin()">دخول الأدمن</button>
</div>

<!-- الصفحة الرئيسية -->
<div id="mainPage">

    <div class="header">
        <h1>Arab Studio</h1>
    </div>

    <div class="menu">
        <button onclick="showAdmins()">المسؤولين</button>
        <button onclick="showMembers()">عدد السيرفر</button>
        <button onclick="showActivation()">تفعيل</button>
        <button onclick="showContact()">تواصل معنا</button>
    </div>

    <div class="content" id="contentArea">
        <h2>مرحباً بك في عرب استديو</h2>
    </div>

</div>

<script>
function login(){
    var user = document.getElementById("username").value;
    var pass = document.getElementById("password").value;

    if(user === "user" && pass === "1234"){
        document.getElementById("loginPage").style.display="none";
        document.getElementById("mainPage").style.display="block";
    }else{
        alert("البيانات غير صحيحة");
    }
}

function adminLogin(){
    var code = prompt("ادخل الرقم السري:");
    if(code === "222333"){
        document.getElementById("loginPage").style.display="none";
        document.getElementById("mainPage").style.display="block";
    }else{
        alert("رقم سري غير صحيح");
    }
}

function showAdmins(){
    document.getElementById("contentArea").innerHTML = `
        <div class="card">قوست</div>
        <div class="card">مشعل</div>
        <h3 style="color:#0d47a1;">عدد الأعضاء: 100</h3>
    `;
}

function showMembers(){
    document.getElementById("contentArea").innerHTML = `
        <h2>عدد الأعضاء في السيرفر</h2>
        <h1 style="color:#0d47a1;">100</h1>
    `;
}

function showActivation(){
    document.getElementById("contentArea").innerHTML = `
        <h1 style="color:#0d47a1;">Coming Soon</h1>
    `;
}

function showContact(){
    document.getElementById("contentArea").innerHTML = `
        <h2>تواصل معنا قريباً</h2>
    `;
}
</script>

</body>
</html>
